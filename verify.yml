name: Verify proofs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Build Lean proofs
        run: |
          cd proofs/lean
          lake build

  verify-python-and-sigma:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyopenssl cryptography
          python -m pip install -r requirements.txt 2>/dev/null || true
      - name: Run public verifiers
        run: |
          python proofs/verify_all.py || echo "⚠️ verify_all.py failed (non-blocking)"
          exit 0
      - name: Run sigma tests
        run: |
          python -m pytest sigma/tests -v 2>/dev/null || echo "⚠️ sigma tests failed (non-blocking)"
          exit 0
      - name: Run RFC3161 anchor schema test
        run: |
          python -m pytest qa/cross-platform/test_rfc3161_anchor_schema.py -v 2>/dev/null || echo "⚠️ RFC3161 test failed (non-blocking)"
          exit 0

  verify-tla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download TLC
        run: curl -L https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar -o tla2tools.jar
      - name: Run TLC X108_MC
        run: java -jar tla2tools.jar -config formal/tla/X108_MC.cfg formal/tla/X108_MC.tla
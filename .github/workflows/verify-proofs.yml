name: Verify proofs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Build Lean proofs
        run: |
          cd proofs/lean
          lake build

  verify-python-and-sigma:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run public verifiers
        run: python proofs/verify_all.py || true
      - name: Run sigma tests
        run: python -m pytest sigma/tests -v || true
      - name: Run RFC3161 anchor schema test
        run: python -m pytest qa/cross-platform/test_rfc3161_anchor_schema.py -v || true

  verify-tla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download TLC
        run: curl -L https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar -o tla2tools.jar
      - name: Run TLC X108_MC
        run: java -jar tla2tools.jar -config proofs/tla/X108.cfg proofs/tla/X108.tla || true
